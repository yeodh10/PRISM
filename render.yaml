# Render.com Blueprint — https://render.com/docs/blueprint-spec
# 배포: Render 대시보드 → New → Blueprint → 이 repo 선택 → ANTHROPIC_API_KEY 입력
services:
  - type: web
    name: prism
    runtime: python
    plan: free               # ⚠️ 무료 티어(512MB)는 torch+임베딩 모델 메모리에 빠듯. DEPLOY.md 참고.
    buildCommand: "pip install -r requirements.txt && python -m scripts.build_index"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # 시크릿 — 대시보드에서 직접 입력(커밋 금지)
      - key: PYTHON_VERSION
        value: "3.12.10"
